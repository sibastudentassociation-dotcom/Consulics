<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="160" fill="#f5f5f5" rx="8"/>
  
  <!-- Tractor unit -->
  <rect x="20" y="45" width="60" height="50" fill="#d32f2f" stroke="#333" stroke-width="2" rx="3"/>
  
  <!-- Tractor cab window -->
  <rect x="30" y="55" width="20" height="18" fill="#e8f4f8" stroke="#333" stroke-width="1" rx="2"/>
  
  <!-- Front axle wheel -->
  <circle cx="45" cy="100" r="10" fill="#333"/>
  <circle cx="45" cy="100" r="6" fill="#666"/>
  
  <!-- Back axles wheels -->
  <circle cx="70" cy="100" r="8" fill="#333"/>
  <circle cx="70" cy="100" r="5" fill="#666"/>
  
  <!-- Connection point -->
  <rect x="75" y="65" width="8" height="30" fill="#333"/>
  
  <!-- Trailer unit -->
  <rect x="90" y="40" width="130" height="55" fill="#FF6B35" stroke="#333" stroke-width="2" rx="3"/>
  
  <!-- Trailer cargo doors -->
  <line x1="150" y1="40" x2="150" y2="95" stroke="#333" stroke-width="1.5"/>
  
  <!-- Trailer wheels -->
  <circle cx="120" cy="100" r="10" fill="#333"/>
  <circle cx="120" cy="100" r="6" fill="#666"/>
  
  <circle cx="185" cy="100" r="10" fill="#333"/>
  <circle cx="185" cy="100" r="6" fill="#666"/>
  
  <!-- Label -->
  <text x="120" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#333" font-family="Arial, sans-serif">Trailer Truck</text>
</svg>
