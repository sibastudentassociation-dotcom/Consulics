<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="260" height="180" fill="#f5f5f5" rx="8"/>
  
  <!-- Ambulance body -->
  <rect x="30" y="50" width="200" height="80" fill="#FF6B35" stroke="#333" stroke-width="2" rx="5"/>
  
  <!-- Ambulance cabin/front -->
  <rect x="30" y="50" width="50" height="80" fill="#FF5722" stroke="#333" stroke-width="2" rx="3"/>
  
  <!-- Windshield -->
  <polygon points="35,55 75,55 75,85 35,85" fill="#b3e5fc" stroke="#333" stroke-width="1"/>
  
  <!-- Rear cargo area -->
  <rect x="85" y="55" width="140" height="70" fill="#FF6B35" stroke="#333" stroke-width="1" rx="2"/>
  
  <!-- Cargo door line -->
  <line x1="155" y1="55" x2="155" y2="125" stroke="#333" stroke-width="1.5"/>
  
  <!-- Medical cross on side -->
  <g transform="translate(155, 80)">
    <rect x="-12" y="-12" width="24" height="24" fill="white" stroke="#333" stroke-width="1" rx="2"/>
    <rect x="-3" y="-10" width="6" height="20" fill="#FF6B35"/>
    <rect x="-10" y="-3" width="20" height="6" fill="#FF6B35"/>
  </g>
  
  <!-- Front wheel -->
  <circle cx="60" cy="135" r="12" fill="#333" stroke="#111" stroke-width="1"/>
  <circle cx="60" cy="135" r="8" fill="#555"/>
  
  <!-- Rear wheels -->
  <circle cx="200" cy="135" r="12" fill="#333" stroke="#111" stroke-width="1"/>
  <circle cx="200" cy="135" r="8" fill="#555"/>
  
  <!-- Label -->
  <text x="130" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#333" font-family="Arial, sans-serif">Ambulance</text>
</svg>
