<svg viewBox="0 0 280 160" xmlns="http://www.w3.org/2000/svg">
  <!-- License plate background -->
  <rect width="280" height="160" fill="#e8e8e8" rx="8"/>
  
  <!-- Plate shadow/border -->
  <rect x="10" y="20" width="260" height="120" fill="#f8f8f8" stroke="#999" stroke-width="2" rx="4"/>
  
  <!-- Blue state section (left) -->
  <rect x="15" y="25" width="50" height="110" fill="#003DA5" rx="2"/>
  
  <!-- State code -->
  <text x="40" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">VA</text>
  
  <!-- "SAMPLE" text -->
  <text x="140" y="65" text-anchor="middle" font-size="18" font-weight="bold" fill="#003DA5" font-family="Arial, sans-serif">SAMPLE</text>
  
  <!-- Plate number -->
  <text x="140" y="95" text-anchor="middle" font-size="32" font-weight="bold" fill="#000" font-family="Courier, monospace">1</text>
  
  <!-- "FOR HIRE" indicator -->
  <text x="235" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#003DA5" font-family="Arial, sans-serif">FOR</text>
  <text x="235" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#003DA5" font-family="Arial, sans-serif">HIRE</text>
</svg>
